name: Update Sports Calendar

on:
  schedule:
    # 每 3 小時跑一次，接住打線公布（賽前 2~3 小時才有）的時間差
    - cron: "0 */3 * * *"
  workflow_dispatch:  # 手動觸發
  push:
    branches: [main]
    paths:
      - "config.yaml"
      - "data/**"
      - "generate.py"
      - "requirements.txt"
      - ".github/workflows/update-calendar.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate calendar
        run: python generate.py

      - name: Validate event count (sanity check)
        id: validate
        run: |
          if [ ! -f docs/sports.ics ]; then
            echo "ERROR: docs/sports.ics not generated" >&2
            exit 1
          fi
          COUNT=$(grep -c '^BEGIN:VEVENT' docs/sports.ics || true)
          echo "event_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Total events: $COUNT"
          MIN_EVENTS=${MIN_EVENTS:-100}
          if [ "$COUNT" -lt "$MIN_EVENTS" ]; then
            echo "ERROR: too few events ($COUNT < $MIN_EVENTS), likely upstream API issue" >&2
            exit 1
          fi

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/sports.ics data/vnl_2026.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: refresh sports.ics ($(date -u +%Y-%m-%dT%H:%MZ))"
            # 這個 repo 另有 hyrox-monitor.yml 排程也會 commit，
            # push 前先 pull --rebase 防止撞車，失敗重試幾次。
            for i in 1 2 3; do
              if git pull --rebase origin main && git push; then
                echo "push 成功"
                break
              fi
              echo "push 失敗，5 秒後重試 ($i/3)..."
              sleep 5
            done
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify Telegram on success (only when changed)
        if: success() && steps.commit.outputs.changed == 'true' && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          DIFF_SUMMARY=""
          if [ -f "${RUNNER_TEMP}/diff_summary.txt" ]; then
            DIFF_SUMMARY=$(cat "${RUNNER_TEMP}/diff_summary.txt")
          fi
          MSG="✅ Sports Calendar 已更新
          ${DIFF_SUMMARY}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d disable_notification=true > /dev/null

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ Sports Calendar workflow 失敗
          Repo: ${{ github.repository }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" > /dev/null
