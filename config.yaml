# 運動賽事訂閱設定
# 修改下面的隊伍清單以變更追蹤對象，commit 後 GitHub Actions 會自動更新 .ics

timezone: Asia/Taipei

nba:
  enabled: true
  # ESPN team id 對照: lakers=13, spurs=24, warriors=9, celtics=2,
  # mavericks=6, suns=21, thunder=25, bucks=15, sixers=20, nuggets=7, heat=14
  teams:
    - { id: 13, name: "Los Angeles Lakers", zh: "湖人" }
    - { id: 24, name: "San Antonio Spurs", zh: "馬刺" }

mlb:
  enabled: true
  # 只有 tracked_players 出賽的場次才會出現在行事曆（其餘場次不顯示）
  # teams 是抓資料範圍：新增追蹤球員時，記得把他所屬的球隊也加進這裡，
  # 否則系統根本不會去抓他球隊的賽程，永遠偵測不到他出賽
  # MLB team id 對照: dodgers=119, yankees=147, astros=117, tigers=116,
  # padres=135, redsox=111, mets=121, braves=144, phillies=143
  teams:
    - { id: 119, name: "Los Angeles Dodgers", zh: "道奇" }
    - { id: 117, name: "Houston Astros", zh: "太空人" }
    - { id: 116, name: "Detroit Tigers", zh: "老虎" }
    - { id: 111, name: "Boston Red Sox", zh: "紅襪" }
  # 追蹤特定選手出賽：只有命中才會產生事件，summary 後綴 🎯名字
  # track: "pitcher" 用 probablePitcher（投手先發資訊，遠期都能拿到）
  # track: "lineup"  用 lineups（野手陣容，只在賽前數小時才有，命中時間點較晚）
  # track: "both"    投手＋打者都查（用於兩刀流球員）
  tracked_players:
    - { id: 660271, zh: "大谷翔平", track: "both" }
    - { id: 808967, zh: "山本由伸", track: "pitcher" }
    - { id: 808963, zh: "佐佐木朗希", track: "pitcher" }
    - { id: 701678, zh: "李灝宇", track: "lineup" }
    - { id: 678906, zh: "鄧愷威", track: "pitcher" }
    - { id: 691907, zh: "鄭宗哲", track: "lineup" }

f1:
  enabled: true
  season: 2026
  # 要納入的場次類型
  sessions:
    qualifying: true        # 排位賽
    race: true              # 正賽
    sprint_qualifying: true # Sprint 排位（只在 Sprint 週末有）
    sprint: true            # Sprint 正賽（只在 Sprint 週末有）
    practice1: false
    practice2: false
    practice3: false

vnl:
  enabled: true
  season: 2026
  # 男排 / 女排各自追蹤的隊伍（英文名）
  teams:
    men:
      - "Japan"
    women:
      - "Japan"
      - "Brazil"

worldcup:
  enabled: true
  # ESPN team name 對照（注意拼法）
  teams:
    - "Argentina"
    - "Brazil"
    - "France"
    - "England"
    - "Japan"
    - "South Korea"
    - "Norway"
    - "Portugal"
    - "Spain"
    - "Croatia"
  # 淘汰賽是否全部納入（不限定隊伍）
  # false = 只收選擇隊伍晉級的場次（小組賽結束後 ESPN 更新隊名才會出現）
  # true  = 全部淘汰賽都納入
  knockout_all: false
